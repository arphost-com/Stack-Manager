# HTTP: serves ACME HTTP-01 challenge files and redirects everything else to HTTPS.
server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;

    location /.well-known/acme-challenge/ {
        root /etc/nginx/ssl/acme-webroot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: terminates TLS with the self-signed cert (default) or Let's Encrypt
# cert once the operator switches. Cert files live in the state volume so they
# persist across container rebuilds.
server {
    listen 8443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:StackManagerTLS:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://server:8192;

    # API proxy
    location /api/ {
        # Public dashboard API proxy to the internal Stack Manager API service.
        proxy_pass $api_upstream; # nosemgrep: generic.nginx.security.missing-internal.missing-internal
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # Health endpoint proxy
    location /health {
        # Public health proxy to the internal Stack Manager API service.
        proxy_pass $api_upstream; # nosemgrep: generic.nginx.security.missing-internal.missing-internal
    }

    # Hashed JS/CSS assets — long cache, immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — always revalidate index.html so browsers pick up
    # new hashed asset filenames after a rebuild without needing Cmd+Shift+R.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
