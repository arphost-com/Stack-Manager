server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://server:8192;

    # API proxy
    location /api/ {
        # Public dashboard API proxy to the internal Stack Manager API service.
        proxy_pass $api_upstream; # nosemgrep: generic.nginx.security.missing-internal.missing-internal
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Health endpoint proxy
    location /health {
        # Public health proxy to the internal Stack Manager API service.
        proxy_pass $api_upstream; # nosemgrep: generic.nginx.security.missing-internal.missing-internal
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
