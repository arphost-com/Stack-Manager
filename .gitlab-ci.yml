stages:
  - validate
  - test
  - build
  - security
  - deploy
  - smoke
  - production

variables:
  DEPLOY_USER: "debian"
  DEPLOY_PATH: "/home/debian/docker/stack-manager"
  DOCKER_ROOT: "/home/debian/docker"
  STATE_DIR: "/home/debian/docker/stack-manager/.stack-manager"
  WEB_PORT: "8193"
  COMPOSE_PROJECT_NAME: "stack-manager"
  CI_COMPOSE_PROJECT_NAME: "stack-manager-ci-${CI_PIPELINE_ID}"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - docker02
  interruptible: true

validate:compose:
  stage: validate
  script:
    - bash -n stack-manager.sh
    - export API_KEY="ci-placeholder"
    - export DB_PASSWORD="ci-db-password"
    - export DB_ROOT_PASSWORD="ci-db-root-password"
    - export REDIS_PASSWORD="ci-redis-password"
    - export DOCKER_ROOT="${DOCKER_ROOT}"
    - export STATE_DIR="${STATE_DIR}"
    - export WEB_PORT="${WEB_PORT}"
    - export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"
    - export SERVER_USER="$(id -u "${DEPLOY_USER}"):$(id -g "${DEPLOY_USER}")"
    - docker compose -p "${CI_COMPOSE_PROJECT_NAME}" config -q

test:server:
  stage: test
  script:
    - docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e GOCACHE=/tmp/go-build -e GOMODCACHE=/tmp/go-mod -v "$PWD/server:/src" -w /src golang:1.25-alpine go test ./...

test:web:
  stage: test
  script:
    - docker run --rm --user "$(id -u):$(id -g)" -e HOME=/tmp -e npm_config_cache=/tmp/.npm -v "$PWD/web:/src" -w /src node:20-alpine sh -lc 'npm ci && npm run build'

build:images:
  stage: build
  needs:
    - validate:compose
    - test:server
    - test:web
  script:
    - export API_KEY="ci-placeholder"
    - export DB_PASSWORD="ci-db-password"
    - export DB_ROOT_PASSWORD="ci-db-root-password"
    - export REDIS_PASSWORD="ci-redis-password"
    - export DOCKER_ROOT="${DOCKER_ROOT}"
    - export STATE_DIR="${STATE_DIR}"
    - export WEB_PORT="${WEB_PORT}"
    - export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"
    - export SERVER_USER="$(id -u "${DEPLOY_USER}"):$(id -g "${DEPLOY_USER}")"
    - docker compose -p "${CI_COMPOSE_PROJECT_NAME}" build

security:semgrep:
  stage: security
  script:
    - command -v semgrep
    - semgrep scan --config p/default --error --gitlab-sast --output gl-sast-report.json .
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json

security:gitleaks:
  stage: security
  script:
    - command -v gitleaks
    - gitleaks detect --source . --redact --report-format json --report-path gitleaks-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - gitleaks-report.json

security:trufflehog:
  stage: security
  script:
    - command -v trufflehog
    - trufflehog filesystem --no-update --json --fail . | tee trufflehog-report.json
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trufflehog-report.json

security:trivy_repo:
  stage: security
  script:
    - command -v trivy
    - |
      ignore_args=""
      if [ -f .trivyignore ]; then
        ignore_args="--ignorefile .trivyignore"
      fi
      trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL ${ignore_args} --format json --output trivy-repo-report.json --exit-code 1 .
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-repo-report.json

security:dependency_check:
  stage: security
  script:
    - command -v dependency-check
    - mkdir -p "${HOME}/.cache/dependency-check-data"
    - dependency-check --data "${HOME}/.cache/dependency-check-data" --project "stack-manager" --scan . --format GITLAB --out gl-dependency-scanning-report.json --failOnCVSS 7
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    paths:
      - gl-dependency-scanning-report.json

security:image_scan:
  stage: security
  needs:
    - build:images
  script:
    - command -v trivy
    - export API_KEY="ci-placeholder"
    - export DB_PASSWORD="ci-db-password"
    - export DB_ROOT_PASSWORD="ci-db-root-password"
    - export REDIS_PASSWORD="ci-redis-password"
    - export DOCKER_ROOT="${DOCKER_ROOT}"
    - export STATE_DIR="${STATE_DIR}"
    - export WEB_PORT="${WEB_PORT}"
    - export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"
    - export SERVER_USER="$(id -u "${DEPLOY_USER}"):$(id -g "${DEPLOY_USER}")"
    - docker compose -p "${CI_COMPOSE_PROJECT_NAME}" build
    - |
      ignore_args=""
      if [ -f .trivyignore ]; then
        ignore_args="--ignorefile .trivyignore"
      fi
      server_image="${CI_COMPOSE_PROJECT_NAME}-server"
      web_image="${CI_COMPOSE_PROJECT_NAME}-web"
      docker image inspect "${server_image}" >/dev/null
      docker image inspect "${web_image}" >/dev/null
      rc=0
      trivy image --scanners vuln,secret,misconfig --severity HIGH,CRITICAL ${ignore_args} --format json --output trivy-server-image-report.json --exit-code 1 "${server_image}" || rc=$?
      trivy image --scanners vuln,secret,misconfig --severity HIGH,CRITICAL ${ignore_args} --format json --output trivy-web-image-report.json --exit-code 1 "${web_image}" || rc=$?
      exit "${rc}"
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - trivy-server-image-report.json
      - trivy-web-image-report.json

deploy:docker02:
  stage: deploy
  needs:
    - validate:compose
    - test:server
    - test:web
    - build:images
    - security:semgrep
    - security:gitleaks
    - security:trufflehog
    - security:trivy_repo
    - security:dependency_check
    - security:image_scan
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: never
  resource_group: docker02-stack-manager
  environment:
    name: docker02-dev
    url: "http://docker02:${WEB_PORT}"
  script:
    - export DOCKER_GID="$(stat -c '%g' /var/run/docker.sock)"
    - export SERVICE_UID="$(id -u "${DEPLOY_USER}")"
    - export SERVICE_GID="$(id -g "${DEPLOY_USER}")"
    - export SERVER_USER="${SERVICE_UID}:${SERVICE_GID}"
    - sudo -n mkdir -p "${DEPLOY_PATH}" "${STATE_DIR}/hooks" "${STATE_DIR}/backups" "${STATE_DIR}/docker-config" "${STATE_DIR}/jobs" "${STATE_DIR}/mariadb" "${STATE_DIR}/redis"
    - sudo -n chown -R "${DEPLOY_USER}:${DEPLOY_USER}" "${DEPLOY_PATH}" "${STATE_DIR}/hooks" "${STATE_DIR}/backups" "${STATE_DIR}/docker-config" "${STATE_DIR}/jobs"
    - sudo -n chown "${DEPLOY_USER}:${DEPLOY_USER}" "${STATE_DIR}"
    - sudo -n find "${STATE_DIR}" "${STATE_DIR}/hooks" "${STATE_DIR}/backups" "${STATE_DIR}/docker-config" "${STATE_DIR}/jobs" -type d -exec chmod 2770 {} +
    - sudo -n find "${STATE_DIR}/hooks" "${STATE_DIR}/backups" "${STATE_DIR}/docker-config" "${STATE_DIR}/jobs" -type f -exec chmod 660 {} +
    - sudo -n rsync -a --delete --chown="${DEPLOY_USER}:${DEPLOY_USER}" --exclude='.git/' --exclude='.claude/' --exclude='.env' --exclude='.stack-manager/' --exclude='bin/' --exclude='node_modules/' --exclude='web/dist/' --exclude='tmp/' ./ "${DEPLOY_PATH}/"
    - |
      sudo -n -u "${DEPLOY_USER}" env \
        DEPLOY_PATH="${DEPLOY_PATH}" \
        DOCKER_ROOT="${DOCKER_ROOT}" \
        STATE_DIR="${STATE_DIR}" \
        WEB_PORT="${WEB_PORT}" \
        DOCKER_GID="${DOCKER_GID}" \
        SERVER_USER="${SERVER_USER}" \
        STACK_MANAGER_API_KEY="${STACK_MANAGER_API_KEY:-}" \
        STACK_MANAGER_DB_PASSWORD="${STACK_MANAGER_DB_PASSWORD:-}" \
        STACK_MANAGER_DB_ROOT_PASSWORD="${STACK_MANAGER_DB_ROOT_PASSWORD:-}" \
        STACK_MANAGER_REDIS_PASSWORD="${STACK_MANAGER_REDIS_PASSWORD:-}" \
        sh <<'SH'
      set -eu
      env_file="${DEPLOY_PATH}/.env"
      get_env() {
        if [ -f "${env_file}" ]; then
          awk -F= -v key="$1" '$1 == key { sub(/^[^=]*=/, ""); print; exit }' "${env_file}"
        fi
      }
      gen_secret() {
        if command -v openssl >/dev/null 2>&1; then
          openssl rand -hex 32
        else
          head -c 48 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 48
        fi
      }
      api_key="${STACK_MANAGER_API_KEY:-$(get_env API_KEY || true)}"
      db_password="${STACK_MANAGER_DB_PASSWORD:-$(get_env DB_PASSWORD || true)}"
      db_root_password="${STACK_MANAGER_DB_ROOT_PASSWORD:-$(get_env DB_ROOT_PASSWORD || true)}"
      redis_password="${STACK_MANAGER_REDIS_PASSWORD:-$(get_env REDIS_PASSWORD || true)}"
      host_url="$(get_env HOST_URL || true)"
      base_image_prefix="$(get_env BASE_IMAGE_PREFIX || true)"
      [ -n "${api_key}" ] || api_key="$(gen_secret)"
      [ -n "${db_password}" ] || db_password="$(gen_secret)"
      [ -n "${db_root_password}" ] || db_root_password="$(gen_secret)"
      [ -n "${redis_password}" ] || redis_password="$(gen_secret)"
      [ -n "${host_url}" ] || host_url="http://docker02:${WEB_PORT}"
      # BASE_IMAGE_PREFIX defaults to empty so images pull directly from Docker
      # Hub using docker02's authenticated login. Set it via the .env or a CI
      # variable once the GitLab dependency proxy has valid Docker Hub credentials.
      # Example: BASE_IMAGE_PREFIX=10.10.10.96:8929/arphost/dependency_proxy/containers/library/
      umask 077
      tmp="$(mktemp)"
      printf '%s\n' \
        "API_KEY=${api_key}" \
        "DB_PASSWORD=${db_password}" \
        "DB_ROOT_PASSWORD=${db_root_password}" \
        "REDIS_PASSWORD=${redis_password}" \
        "DOCKER_ROOT=${DOCKER_ROOT}" \
        "STATE_DIR=${STATE_DIR}" \
        "WEB_PORT=${WEB_PORT}" \
        "DOCKER_GID=${DOCKER_GID}" \
        "SERVER_USER=${SERVER_USER}" \
        "HOST_URL=${host_url}" \
        "BASE_IMAGE_PREFIX=${base_image_prefix}" \
        > "${tmp}"
      install -m 600 "${tmp}" "${env_file}"
      rm -f "${tmp}"
      SH
    - sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml run --rm --no-deps --user root --entrypoint sh mariadb -c "chown -R mysql:mysql /var/lib/mysql"' sh "${DEPLOY_PATH}"
    - sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml run --rm --no-deps --user root --entrypoint sh redis -c "chown -R redis:redis /data"' sh "${DEPLOY_PATH}"
    - sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml up -d --build --remove-orphans --force-recreate state-init server web' sh "${DEPLOY_PATH}"
    - sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml up -d --no-build mariadb redis' sh "${DEPLOY_PATH}"

smoke:docker02:
  stage: smoke
  needs:
    - deploy:docker02
  rules:
    - when: on_success
  script:
    - export SMOKE_API_KEY="$(sudo -n -u "${DEPLOY_USER}" awk -F= '$1 == "API_KEY" { sub(/^[^=]*=/, ""); print; exit }' "${DEPLOY_PATH}/.env")"
    - sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml ps' sh "${DEPLOY_PATH}"
    - |
      for i in $(seq 1 60); do
        if curl -fsS "http://127.0.0.1:${WEB_PORT}/health"; then
          break
        fi
        if [ "$i" -eq 60 ]; then
          sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml ps && docker compose --env-file .env -f docker-compose.yml logs --tail=120 server web mariadb redis state-init' sh "${DEPLOY_PATH}"
          exit 1
        fi
        sleep 2
      done
    - |
      for i in $(seq 1 30); do
        if curl -fsS \
          -H "X-API-Key: ${SMOKE_API_KEY}" \
          "http://127.0.0.1:${WEB_PORT}/api/v1/projects" \
          >"${CI_PROJECT_DIR}/stack-manager-projects.json"; then
          break
        fi
        if [ "$i" -eq 30 ]; then
          sudo -n -u "${DEPLOY_USER}" sh -c 'cd "$1" && docker compose --env-file .env -f docker-compose.yml logs --tail=120 server web' sh "${DEPLOY_PATH}"
          exit 1
        fi
        sleep 2
      done
    - sudo -n find "${DEPLOY_PATH}" "${STATE_DIR}" -maxdepth 2 -printf '%M %u:%g %p\n'

push:github:
  stage: production
  needs:
    - smoke:docker02
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true
    - when: never
  script:
    - |
      if [ -z "${GITHUB_PAT:-}" ]; then
        echo "GITHUB_PAT is not set. Configure it as a masked GitLab CI/CD variable, then retry this manual job."
        echo "No GitHub push was performed."
        exit 1
      fi
    - git push "https://x-access-token:${GITHUB_PAT}@github.com/arphost-com/Stack-Manager.git" "HEAD:main"
    - |
      github_sha="$(git ls-remote https://github.com/arphost-com/Stack-Manager.git refs/heads/main | awk '{print $1}')"
      if [ "${github_sha}" != "${CI_COMMIT_SHA}" ]; then
        echo "GitHub main is ${github_sha}, expected ${CI_COMMIT_SHA}."
        exit 1
      fi
      echo "GitHub main updated to ${github_sha}."
