services:
  state-init:
    image: ${BASE_IMAGE_PREFIX:-}alpine:3.22
    user: "0:0"
    environment:
      SERVER_USER: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    command:
      - sh
      - -eu
      - -c
      - |
        mkdir -p /state/hooks /state/backups/db-dumps /state/docker-config /state/jobs /state/mariadb /state/redis /state/ssl /state/ssl/acme-webroot /backup-targets
        chown "${SERVER_USER}" /state
        chown -R "${SERVER_USER}" /state/hooks /state/backups /state/docker-config /state/jobs /state/ssl /backup-targets
        find /state /state/hooks /state/backups /state/docker-config /state/jobs /backup-targets -type d -exec chmod 2770 {} +
        find /state/hooks /state/backups /state/docker-config /state/jobs /backup-targets -type f -exec chmod 660 {} +
        # SSL dir is 2775 so both the web container (nginx entrypoint) and
        # certbot helper containers can drop cert/webroot files.
        chmod 2775 /state/ssl /state/ssl/acme-webroot
    volumes:
      - type: bind
        source: ${STATE_DIR:-.stack-manager}
        target: /state
      - type: bind
        source: ${BACKUP_TARGET_ROOT:-.stack-manager/backup-targets}
        target: /backup-targets
        bind:
          create_host_path: true
    restart: "no"

  server:
    build:
      context: ./server
      args:
        BASE_IMAGE_PREFIX: ${BASE_IMAGE_PREFIX:-}
    environment:
      PORT: "8192"
      ROOT: "/docker"
      STATE_DIR: "/state"
      API_KEY: "${API_KEY:?API_KEY required}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      DB_HOST: "mariadb"
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:-stack_manager}"
      DB_USER: "${DB_USER:-stack_manager}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD required}"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
      REDIS_DB: "${REDIS_DB:-0}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-15}"
      HOOKS_DIR: "/state/hooks"
      BACKUP_DIR: "/state/backups"
      DOCKER_CONFIG: "/state/docker-config"
      DOCKER_DAEMON_DIR: "${DOCKER_DAEMON_DIR:-/etc/docker}"
      BASE_IMAGE_PREFIX: "${BASE_IMAGE_PREFIX:-}"
      FRONTEND_EXTERNAL: "true"
    user: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${DOCKER_ROOT:?DOCKER_ROOT required, set to the directory containing managed Compose projects}
        target: /docker
        bind:
          create_host_path: false
      - type: bind
        source: ${STATE_DIR:-.stack-manager}
        target: /state
        bind:
          create_host_path: false
      - type: bind
        source: ${BACKUP_TARGET_ROOT:-.stack-manager/backup-targets}
        target: /backup-targets
        bind:
          create_host_path: true
    depends_on:
      state-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        BASE_IMAGE_PREFIX: ${BASE_IMAGE_PREFIX:-}
    environment:
      SSL_CN: "${SSL_CN:-}"
      SSL_EXTRA_SANS: "${SSL_EXTRA_SANS:-}"
      SSL_SELF_SIGNED_DAYS: "${SSL_SELF_SIGNED_DAYS:-3650}"
    user: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    ports:
      - "${WEB_HTTP_PORT:-${WEB_PORT:-8193}}:8080"
      - "${WEB_SSL_PORT:-8993}:8443"
    volumes:
      - type: bind
        source: ${STATE_DIR:-.stack-manager}/ssl
        target: /etc/nginx/ssl
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
      server:
        condition: service_started
    restart: unless-stopped

  mariadb:
    image: ${BASE_IMAGE_PREFIX:-}mariadb:11.4
    environment:
      MARIADB_DATABASE: "${DB_NAME:-stack_manager}"
      MARIADB_USER: "${DB_USER:-stack_manager}"
      MARIADB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD required}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}"
    volumes:
      - type: bind
        source: ${STATE_DIR:-.stack-manager}/mariadb
        target: /var/lib/mysql
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: ${BASE_IMAGE_PREFIX:-}redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD required}"]
    volumes:
      - type: bind
        source: ${STATE_DIR:-.stack-manager}/redis
        target: /data
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
    restart: unless-stopped
