services:
  server:
    build: ./server
    environment:
      PORT: "8192"
      ROOT: "/docker"
      API_KEY: "${API_KEY:?API_KEY required}"
      HOOKS_DIR: "/docker/.compose-manager/hooks"
      BACKUP_DIR: "/docker/.compose-manager/backups"
      DOCKER_CONFIG: "/docker/.compose-manager/docker-config"
    user: "${SERVER_USER:-1001:1001}"
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_ROOT:-/home/debian/docker}:/docker
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8193}:8080"
    depends_on:
      - server
    restart: unless-stopped
