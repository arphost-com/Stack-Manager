services:
  state-init:
    image: alpine:3.22
    user: "0:0"
    environment:
      SERVER_USER: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    command:
      - sh
      - -eu
      - -c
      - |
        mkdir -p /state/hooks /state/backups/db-dumps /state/docker-config /state/jobs /state/mariadb /state/redis
        chown "${SERVER_USER}" /state
        chown -R "${SERVER_USER}" /state/hooks /state/backups /state/docker-config /state/jobs
        find /state /state/hooks /state/backups /state/docker-config /state/jobs -type d -exec chmod 2770 {} +
        find /state/hooks /state/backups /state/docker-config /state/jobs -type f -exec chmod 660 {} +
    volumes:
      - type: bind
        source: ${STATE_DIR:-.compose-manager}
        target: /state
    restart: "no"

  server:
    build: ./server
    environment:
      PORT: "8192"
      ROOT: "/docker"
      STATE_DIR: "/state"
      API_KEY: "${API_KEY:?API_KEY required}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      DB_HOST: "mariadb"
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:-compose_manager}"
      DB_USER: "${DB_USER:-compose_manager}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD required}"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
      REDIS_DB: "${REDIS_DB:-0}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-15}"
      HOOKS_DIR: "/state/hooks"
      BACKUP_DIR: "/state/backups"
      DOCKER_CONFIG: "/state/docker-config"
      FRONTEND_EXTERNAL: "true"
    user: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${DOCKER_ROOT:?DOCKER_ROOT required, set to the directory containing managed Compose projects}
        target: /docker
        bind:
          create_host_path: false
      - type: bind
        source: ${STATE_DIR:-.compose-manager}
        target: /state
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "${WEB_PORT:-8193}:8080"
    depends_on:
      - server
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: "${DB_NAME:-compose_manager}"
      MARIADB_USER: "${DB_USER:-compose_manager}"
      MARIADB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD required}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}"
    volumes:
      - type: bind
        source: ${STATE_DIR:-.compose-manager}/mariadb
        target: /var/lib/mysql
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD required}"]
    volumes:
      - type: bind
        source: ${STATE_DIR:-.compose-manager}/redis
        target: /data
        bind:
          create_host_path: false
    depends_on:
      state-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
    restart: unless-stopped
