services:
  state-init-agent:
    image: ${BASE_IMAGE_PREFIX:-}alpine:3.22
    user: "0:0"
    environment:
      SERVER_USER: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    command:
      - sh
      - -eu
      - -c
      - |
        mkdir -p /state/hooks /state/backups/db-dumps /state/docker-config /state/jobs /backup-targets
        chown "${SERVER_USER}" /state
        chown -R "${SERVER_USER}" /state/hooks /state/backups /state/docker-config /state/jobs /backup-targets
        find /state /state/hooks /state/backups /state/docker-config /state/jobs /backup-targets -type d -exec chmod 2770 {} +
        find /state/hooks /state/backups /state/docker-config /state/jobs /backup-targets -type f -exec chmod 660 {} +
    volumes:
      - type: bind
        source: ${STATE_DIR:-.stack-manager}
        target: /state
      - type: bind
        source: ${BACKUP_TARGET_ROOT:-.stack-manager/backup-targets}
        target: /backup-targets
        bind:
          create_host_path: true
    restart: "no"

  agent:
    build:
      context: ./server
      args:
        BASE_IMAGE_PREFIX: ${BASE_IMAGE_PREFIX:-}
    environment:
      APP_MODE: "${APP_MODE:-agent-callback}"
      PORT: "${AGENT_PORT:-8192}"
      # ROOT and the DOCKER_ROOT mount below both use ${DOCKER_ROOT} so paths
      # inside the agent container match host paths. Required for child
      # compose files that use relative `./file.conf` bind mounts.
      ROOT: "${DOCKER_ROOT}"
      STATE_DIR: "/state"
      HOOKS_DIR: "/state/hooks"
      BACKUP_DIR: "/state/backups"
      DOCKER_CONFIG: "/state/docker-config"
      AGENT_NAME: "${AGENT_NAME:?AGENT_NAME required}"
      AGENT_TOKEN: "${AGENT_TOKEN:?AGENT_TOKEN required}"
      AGENT_CONTROLLER_URL: "${AGENT_CONTROLLER_URL:-}"
      AGENT_CHECKIN_SECONDS: "${AGENT_CHECKIN_SECONDS:-60}"
      BASE_IMAGE_PREFIX: "${BASE_IMAGE_PREFIX:-}"
    user: "${SERVER_USER:?SERVER_USER required, set to the host service UID:GID such as 1000:1000}"
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "${AGENT_PORT:-8192}:${AGENT_PORT:-8192}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind DOCKER_ROOT at the same host path so relative `./file.conf`
      # bind mounts inside child compose files resolve to real host files.
      - type: bind
        source: ${DOCKER_ROOT:?DOCKER_ROOT required, set to the directory containing managed Compose projects}
        target: ${DOCKER_ROOT:?DOCKER_ROOT required}
        bind:
          create_host_path: false
      - type: bind
        source: ${STATE_DIR:-.stack-manager}
        target: /state
        bind:
          create_host_path: false
      - type: bind
        source: ${BACKUP_TARGET_ROOT:-.stack-manager/backup-targets}
        target: /backup-targets
        bind:
          create_host_path: true
    depends_on:
      state-init-agent:
        condition: service_completed_successfully
    restart: unless-stopped
